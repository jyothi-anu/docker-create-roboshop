services:
  catalogue:
    build: ./catalogue
    image: josh3626/catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb

  mongodb:
    build: ./mongodb
    image: josh3626/mongodb:1.0.0
    container_name: mongodb

  user:
    build: ./user
    image: josh3626/user:1.0.0
    container_name: user
    depends_on:
      - mongodb
      - redis
  
  redis:
    image: redis:7.0
    container_name: redis

  cart:
    build: ./cart
    image: josh3626.cart:1.0.0
    container_name: cart
    depends_on:
      - catalogue
      - redis

  frontend:
    build: ./frontend
    image: josh3626/frontend:1.0.0
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - user
      - cart

  shipping:
    build: ./shipping
    image: josh3626/shipping:1.0.0
    container_name: shipping
    depends_on:
      - mysql

  mysql:
    build: ./mysql
    image: josh3626/mysql:1.0.0
    container_name: mysql
    environment:
      -  MYSQL_ROOT_PASSWORD:Roboshop@1

  rabbitmq:
    image: rabbitmq:3
    environment:
      - RABBITMQ_DEFAULT_USER=roboshop
      - RABBITMQ_DEFAULT_PASS=roboshop123

  payment:
    build: ./payment
    image: josh3626/payment:1.0.0
    container_name: payment
    depends_on:
      - rabbitmq
      - user
      - cart

networks:
  default:
    driver: bridge
    name: roboshop
    external: false